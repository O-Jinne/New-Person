<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>새사람 프로젝트</title>
<script>
(function () {
  var saved = localStorage.getItem("monster-project-theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
})();
</script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <div class="header-top">
      <h1>🧑 새사람 프로젝트</h1>
      <div class="header-icons">
        <button id="theme-toggle-btn" class="profile-icon-btn">🌙</button>
        <button id="tip-btn" class="profile-icon-btn">💡</button>
        <button id="profile-btn" class="profile-icon-btn">👤</button>
      </div>
    </div>
    <p id="today-date"></p>
  </header>

  <div class="screens">

    <section id="screen-history" class="screen active screen-history-split">
      <div class="history-top" id="history-profile-summary"></div>

      <div class="history-bottom">
        <div id="month-stats" class="month-stats"></div>

        <div class="calendar-header">
          <button id="prev-month" class="cal-nav-btn">‹</button>
          <h2 id="calendar-title">운동 기록</h2>
          <button id="next-month" class="cal-nav-btn">›</button>
        </div>

        <div class="calendar-legend">
          <span><i class="dot dot-gym"></i>기구 운동</span>
          <span><i class="dot dot-bw"></i>맨몸 운동</span>
          <span><i class="dot dot-rest"></i>휴식</span>
        </div>

        <div class="calendar-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>

        <div id="calendar-grid" class="calendar-grid"></div>

        <div id="day-detail" class="day-detail"></div>
      </div>
    </section>

    <section id="screen-workout" class="screen">
      <div class="type-select">
        <button class="type-tab" data-type="gym">🏋️<br>기구</button>
        <button class="type-tab" data-type="bodyweight">🤸<br>맨몸</button>
        <button class="type-tab" data-type="rest">💤<br>휴식</button>
      </div>

      <div id="rest-only-group" class="rest-only-group">
        <button id="rest-day-btn" class="primary-btn">오늘은 휴식일로 저장 💤</button>
      </div>

      <div id="workout-detail-group" class="workout-detail-group">
        <div id="workout-setup-view">
          <nav class="day-tabs">
            <button class="day-tab" data-day="1">1</button>
            <button class="day-tab" data-day="2">2</button>
            <button class="day-tab" data-day="3">3</button>
            <button class="day-tab" data-day="4">4</button>
          </nav>

          <p id="day-routine-caption" class="day-routine-caption"></p>

          <div id="editing-banner" class="editing-banner">
            <span id="editing-banner-text"></span>
            <button id="cancel-edit-btn">취소</button>
          </div>

          <main id="routine-view"></main>

          <button id="start-workout-btn" class="primary-btn">운동 시작 ▶</button>

          <div class="setup-btn-row">
            <button id="add-exercise-btn" class="secondary-btn">+ 운동 추가</button>
            <button id="save-log-btn" class="secondary-btn">기록 편집</button>
          </div>
        </div>

        <div id="hero-session" class="hero-session">
          <div class="hero-timer-row">
            <span id="hero-timer" class="hero-timer">00:00</span>
            <button id="finish-workout-btn" class="hero-finish-btn">종료 · 저장</button>
          </div>

          <div id="hero-chip-strip" class="chip-strip"></div>

          <div id="hero-card" class="hero-card"></div>
        </div>
      </div>
    </section>

  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" data-screen="screen-history">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="nav-label">기록</span>
    </button>
    <button class="nav-tab" data-screen="screen-workout">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 L17.5 17.5"/><path d="M21 21l-1.5-1.5"/><path d="M3 3l1.5 1.5"/><path d="M18 22l4-4"/><path d="M2 6l4-4"/><path d="M3 10l7-7"/><path d="M14 21l7-7"/></svg>
      <span class="nav-label">오늘의 운동</span>
    </button>
  </nav>
</div>

<div id="exercise-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <input type="text" id="exercise-search" placeholder="운동 이름 검색 (예: 벤치)" autocomplete="off">
      <button id="close-modal-btn" class="modal-close">✕</button>
    </div>
    <div id="exercise-list" class="modal-list"></div>
  </div>
</div>

<div id="profile-modal" class="modal-overlay center">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title">내 프로필</h3>
      <button id="close-profile-btn" class="modal-close">✕</button>
    </div>
    <div class="profile-form">
      <label>이름</label>
      <input type="text" id="profile-name" placeholder="이름">

      <div class="profile-row">
        <div>
          <label>키 (cm)</label>
          <input type="number" id="profile-height" placeholder="183">
        </div>
        <div>
          <label>몸무게 (kg)</label>
          <input type="number" id="profile-weight" placeholder="80">
        </div>
      </div>

      <button id="save-profile-btn" class="primary-btn">저장</button>

      <div id="profile-result" class="profile-result"></div>

      <div class="backup-row">
        <button id="export-data-btn" class="backup-btn">📤 데이터 내보내기</button>
        <button id="import-data-btn" class="backup-btn">📥 가져오기</button>
        <input type="file" id="import-file-input" accept=".json" style="display:none;">
      </div>
    </div>
  </div>
</div>

<div id="tip-modal" class="modal-overlay center">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title">💡 Tip</h3>
      <button id="close-tip-btn" class="modal-close">✕</button>
    </div>
    <div class="tip-list">
      <div class="tip-item">
        <span class="tip-num">1</span>
        <span>프로필을 클릭해서 본인의 정보를 입력하고 운동 기록을 관리해주세요.</span>
      </div>
      <div class="tip-item">
        <span class="tip-num">2</span>
        <span>3~4일 운동 후에는 반드시 하루 휴식해주세요.</span>
      </div>
      <div class="tip-item">
        <span class="tip-num">3</span>
        <span>운동만큼 수면과 식사도 중요해요. 잘 자고 잘 먹어야 근육이 자랍니다.</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
